<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <h1>Unit Converter</h1>

        <!-- KM to Miles -->
        <div class="box">
            <h3>KM ↔ Miles</h3>
            <input type="number" id="km" placeholder="Kilometers">
            <button onclick="kmToMiles()">Convert to Miles</button>
            <p id="milesResult"></p>
        </div>

        <!-- Celsius to Fahrenheit -->
        <div class="box">
            <h3>Celsius ↔ Fahrenheit</h3>
            <input type="number" id="celsius" placeholder="Celsius">
            <button onclick="cToF()">Convert to Fahrenheit</button>
            <p id="fahrenheitResult"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
